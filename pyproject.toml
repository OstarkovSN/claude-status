# Tooling configuration only — claude-status itself has ZERO runtime
# dependencies (stdlib only) and ships as a single file. Nothing here is
# required to *run* the tool; these settings are for development (tests, lint).

[tool.pytest.ini_options]
# Let `import claude_status` work without installing anything.
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
# A small, sensible set; the tool is intentionally simple.
select = ["E", "F", "W", "I", "UP", "B"]
