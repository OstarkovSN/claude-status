name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Tool targets Python 3.9+; test the floor, a middle, and current.
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # claude-status has ZERO runtime dependencies. These are dev-only tools
      # for linting and running the test suite — never imported by the tool.
      - name: Install dev tools
        run: python -m pip install --upgrade pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Compile-check
        run: python -m py_compile claude_status.py

      - name: Test (pytest)
        run: pytest -q

      # Belt-and-suspenders: the tool must import and run with nothing but the
      # standard library installed (separate clean env, no pip installs).
  zero-dep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run with stdlib only (no installs)
        run: |
          python claude_status.py --help
          python -c "import claude_status; print('import ok, zero deps')"
